name: "Google OSS 安全性打分"

on:
  # 按照您的要求設定觸發條件
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # 支援手動執行
  schedule:
    - cron: '0 0 * * 1' # 每週一 00:00 執行

# 嚴格限制權限，僅允許寫入安全結果
permissions: read-all

jobs:
  analysis:
    name: Scorecard 分析
    runs-on: ubuntu-latest
    permissions:
      security-events: write # 用於上傳結果到 Security 面板
      id-token: write        # 用於與 OpenSSF 進行身分驗證
      contents: read

    steps:
      - name: "檢出儲存庫"
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: "執行 Scorecard 分析"
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # 建議發布結果到 OpenSSF REST API，這能讓您獲得專屬徽章
          publish_results: true

      # 將結果「視覺化」到 GitHub 的 Security 面板
      - name: "上傳至 GitHub Security Tab"
        uses: github/codeql-action/upload-sarif@fb0994ef1c058010acf1efccff928b0a83b1ed54 # v4.32.6
        with:
          sarif_file: results.sarif
          category: oss-scorecard

      - name: "上傳 Scorecard 結果檔案"
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: scorecard-${{ github.sha }}
          path: results.sarif
          retention-days: 2