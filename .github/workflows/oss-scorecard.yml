name: "Google OSS 安全性打分"

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions: read-all

jobs:
  analysis:
    name: Scorecard 分析
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read

    steps:
      - name: "檢出儲存庫"
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: "執行 Scorecard 分析"
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: "上傳至 GitHub Security Tab"
        uses: github/codeql-action/upload-sarif@fb0994ef1c058010acf1efccff928b0a83b1ed54 # v4.32.6
        with:
          sarif_file: results.sarif
          category: oss-scorecard

      - name: "上傳 Scorecard 結果檔案"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: scorecard-${{ github.sha }}
          path: results.sarif
          retention-days: 2