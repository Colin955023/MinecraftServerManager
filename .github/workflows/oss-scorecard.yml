name: "Google OSS 安全性打分"

on:
  workflow_run:
    workflows: ["github-actions CI-Tests"]
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analyze
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master') }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read

    steps:
      - name: "檢出儲存庫"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: "執行 Scorecard 分析"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: openossf_scorecard_report.sarif
          results_format: sarif
          publish_results: true

      - name: "上傳至 GitHub Security Tab"
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          sarif_file: openossf_scorecard_report.sarif
          category: "OpenSSF Scorecard"

      - name: "上傳 Scorecard 結果檔案"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: openossf_scorecard_report
          path: openossf_scorecard_report.sarif
          retention-days: 2