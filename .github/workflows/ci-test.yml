name: CI-Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  quality-gates:
    name: CI-Tests / Quality Gates
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Set up Python
        uses: actions/setup-python@28f2168f4d98ee0445e3c6321f6e6616c83dd5ec
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57

      - name: Install dependencies
        run: uv sync --all-groups


      - name: Run Bandit security scan
        run: uv run bandit -r src

      - name: Generate Bandit SARIF report
        if: always()
        run: uv run bandit -r src -f sarif -o bandit-results.sarif --exit-zero

      - name: Upload Bandit SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@a899987af240c0578ed84ce13c02319a693e168f
        with:
          sarif_file: bandit-results.sarif
          category: bandit-3.12

      - name: Run detect-secrets privacy scan
        shell: bash
        id: detect_secrets
        continue-on-error: true
        run: |
          EXCLUDE_PATTERN='(^|/)\\.git(/|$)|(^|/)\\.venv(/|$)|(^|/)\\.pytest_cache(/|$)|(^|/)__pycache__(/|$)|(^|/)\\.github(/|$)|(^|/)\\.tox(/|$)'
            uv tool run detect-secrets scan --all-files --exclude-files "$EXCLUDE_PATTERN" > secrets_result.json
          python - <<'PY'
          import json, sys, os
          if not os.path.exists('secrets_result.json') or os.path.getsize('secrets_result.json') == 0:
            sys.exit(0)
          with open('secrets_result.json') as f:
            data = json.load(f)
          results = data.get('results', {})
          if results:
            for file, secrets in results.items():
              for s in secrets:
                print(f'::error file={file},line={s["line_number"]}::Secret detected')
            sys.exit(1)
          PY

      - name: Upload detect-secrets report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: detect-secrets-report
          path: secrets_result.json
          retention-days: 2

      - name: Check detect-secrets status
        if: steps.detect_secrets.outcome == 'failure'
        run: |
          echo "Detect-secrets scan failed. Please check the artifact."
          exit 1

  compatibility-tests:
    name: CI-Tests / Python ${{ matrix.python-version }}
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Set up Python
        uses: actions/setup-python@28f2168f4d98ee0445e3c6321f6e6616c83dd5ec
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Compile source files
        run: uv run python -m compileall -q src

      - name: Check formatting
        run: uv run ruff format --check src tests quick_test.py

      - name: Run Ruff lint
        run: uv run ruff check src tests quick_test.py

      - name: Run mypy
        run: uv run mypy src tests quick_test.py

      - name: Run smoke tests (pytest)
        run: uv run --isolated pytest -m smoke -q

      - name: Run integration tests (pytest)
        run: uv run --isolated pytest -m integration -q
