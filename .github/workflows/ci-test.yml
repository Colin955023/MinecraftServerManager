name: github-actions CI-Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
  workflow_dispatch:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  quality-gates:
    name: CI-Tests / Quality Gates
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run Bandit security scan
        run: |
          uv run bandit -r src -f sarif -o bandit-results.sarif --exit-zero
          uv run bandit -r src -f json -o bandit-results.json --exit-zero

      - name: Fail on Bandit HIGH findings
        if: always()
        shell: python
        run: |
          import json, os, sys
          if not os.path.exists('bandit-results.json'):
              print('bandit-results.json not found, skipping')
              sys.exit(0)
          with open('bandit-results.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          high_found = False
          for r in data.get('results', []):
              if r.get('issue_severity', '').upper() == 'HIGH':
                  print(f"::error::Bandit HIGH: {r.get('filename')}:{r.get('line_number')} {r.get('test_id')} {r.get('issue_text')}")
                  high_found = True
          if high_found:
              sys.exit(1)
          print('No Bandit HIGH severity issues found')

      - name: Upload Bandit SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Run detect-secrets privacy scan
        shell: bash
        id: detect_secrets
        run: |
          EXCLUDE_PATTERN='(\.git|\.venv|\.pytest_cache|__pycache__|\.github|\.tox)'
          uv tool run detect-secrets scan --all-files --exclude-files "$EXCLUDE_PATTERN" > secrets_result.json
          python - <<'PY'
          import json, os, sys
          from pathlib import Path
          if not os.path.exists('secrets_result.json') or os.path.getsize('secrets_result.json') == 0:
              sys.exit(0)
          with open('secrets_result.json') as f:
              data = json.load(f)
          results = data.get('results', {})
          if results:
              for file_path, secrets in results.items():
                  file_for_annot = Path(file_path).as_posix()
                  for s in secrets:
                      line = s.get('line_number') or 1
                      print(f'::error file={file_for_annot},line={line}::Potential secret detected in {file_for_annot}')
              sys.exit(1)
          PY

      - name: Upload detect-secrets report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: detect-secrets-report
          path: secrets_result.json
          retention-days: 2

  compatibility-tests:
    name: CI-Tests / Python ${{ matrix.python-version }}
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run Ruff (Lint & Format)
        run: uv run ruff check src tests quick_test.py && uv run ruff format --check src tests quick_test.py

      - name: Run mypy
        run: uv run mypy src tests quick_test.py

      - name: Run tests (pytest)
        run: uv run pytest -m "smoke or integration" -q