name: CI-Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  quality-gates:
    name: CI-Tests / Quality Gates
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82

      - name: Install dependencies
        run: uv sync --all-groups


      - name: Run Bandit security scan
        run: uv run bandit -r src

      - name: Generate Bandit SARIF report
        if: always()
        run: uv run bandit -r src -f sarif -o bandit-results.sarif --exit-zero

      - name: Upload Bandit SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@fb0994ef1c058010acf1efccff928b0a83b1ed54
        with:
          sarif_file: bandit-results.sarif
          category: bandit-3.12

      - name: Run detect-secrets privacy scan
        run: uv tool run detect-secrets scan --only-verified --all-files --fail-on-has-secret

  compatibility-tests:
    name: CI-Tests / Python ${{ matrix.python-version }}
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Compile source files
        run: uv run python -m compileall -q src

      - name: Check formatting
        run: uv run ruff format --check src tests quick_test.py

      - name: Run Ruff lint
        run: uv run ruff check src tests quick_test.py

      - name: Run mypy
        run: uv run mypy src tests quick_test.py

      - name: Run smoke tests (pytest)
        run: uv run --isolated pytest -m smoke -q

      - name: Run integration tests (pytest)
        run: uv run --isolated pytest -m integration -q
