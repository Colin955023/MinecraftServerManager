name: github-actions CI Test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Python ${{ matrix.python-version }} Test
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Compile source files
        run: uv run python -m compileall -q src

      - name: Check formatting
        run: uv run ruff format --check src tests quick_test.py

      - name: Run Ruff lint
        run: uv run ruff check src tests quick_test.py

      - name: Run mypy
        run: uv run mypy src

      - name: Run Bandit security scan
        run: uv tool run bandit -r src

      - name: Generate Bandit SARIF report
        if: always()
        run: uv tool run --with bandit-sarif-formatter bandit -r src -f sarif -o bandit-results.sarif --exit-zero

      - name: Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@b56ba49b26e50535fa1e7f7db0f4f7b4bf65d80d
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Run detect-secrets privacy scan
        run: uv tool run detect-secrets scan --only-verified --all-files

      - name: Run smoke tests (pytest)
        run: uv run --isolated pytest -m smoke -q

      - name: Run integration tests (pytest)
        run: uv run --isolated pytest -m integration -q
