name: github-actions CI-Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
  workflow_dispatch:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  bandit-scan:
    name: CI-Tests / Bandit Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python Environment
        uses: ./.github/actions/setup-python-env
        with:
          uv-sync: 'true'

      - name: Run Bandit security scan
        run: |
          uv run bandit -r src tests -f sarif -o bandit-results.sarif --severity-level high --confidence-level high

      - name: Upload Bandit SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  detect-secrets-scan:
    name: CI-Tests / detect-secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python Environment
        uses: ./.github/actions/setup-python-env
        with:
          uv-sync: 'true'

      - name: Run detect-secrets privacy scan
        run: |
          EXCLUDE_PATTERN='(\.git|\.venv|\.pytest_cache|__pycache__|\.github|\.tox)'
          if [ -f .secrets.baseline ]; then
            uv run detect-secrets scan --baseline .secrets.baseline --only-verified --all-files --exclude-files "$EXCLUDE_PATTERN" > detect-secrets-results.json
          else
            uv run detect-secrets scan --only-verified --all-files --exclude-files "$EXCLUDE_PATTERN" > detect-secrets-results.json
          fi
          uv run python -c "import json,sys; data=json.load(open('detect-secrets-results.json', encoding='utf-8')); sys.exit(1 if data.get('results') else 0)"

      - name: Upload detect-secrets report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: detect_secrets_report
          path: detect-secrets-results.json
          retention-days: 2

  lint-and-test:
    name: CI-Tests / ${{ matrix.task }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: lint
            os: windows-latest
          - task: test
            os: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python Environment
        uses: ./.github/actions/setup-python-env
        with:
          uv-sync: 'true'

      - name: Run Ruff (Lint & Format)
        if: matrix.task == 'lint'
        run: uv run ruff check src tests quick_test.py && uv run ruff format --check src tests quick_test.py

      - name: Run mypy
        if: matrix.task == 'lint'
        run: uv run mypy src tests quick_test.py

      - name: Run Pylint (cyclic import check)
        if: matrix.task == 'lint'
        run: uv run pylint --disable=all --enable=cyclic-import src

      - name: Run tests (pytest)
        if: matrix.task == 'test'
        run: uv run pytest -q --junitxml=pytest-results.xml

      - name: Upload pytest JUnit report
        if: always() && matrix.task == 'test'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: pytest_junit_report_windows
          path: pytest-results.xml
          retention-days: 2

