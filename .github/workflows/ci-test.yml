name: CI-Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  quality-gates:
    name: CI-Tests / Quality Gates
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78

      - name: Install dependencies
        run: uv sync --all-groups


      - name: Run Bandit security scan
        run: uv run bandit -r src

      - name: Generate Bandit SARIF report
        if: always()
        run: uv run bandit -r src -f sarif -o bandit-results.sarif --exit-zero

      - name: Upload Bandit SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: bandit-results.sarif
          category: bandit-3.12

      - name: Run detect-secrets privacy scan
        shell: bash
        id: detect_secrets
        continue-on-error: true
        run: |
          # 1. 簡化正則表達式，移除不必要的雙重跳脫字元，並使用更具兼容性的目錄匹配方式
          EXCLUDE_PATTERN='(\.git|\.venv|\.pytest_cache|__pycache__|\.github|\.tox)'
          uv tool run detect-secrets scan --all-files --exclude-files "$EXCLUDE_PATTERN" > secrets_result.json
          python - <<'PY'
          import json, sys, os
          if not os.path.exists('secrets_result.json') or os.path.getsize('secrets_result.json') == 0:
              sys.exit(0)
          with open('secrets_result.json') as f:
              data = json.load(f)
          results = data.get('results', {})
          if results:
              for file_path, secrets in results.items():
                  # 2. 修正反斜線替換邏輯，確保 Windows 格式的路徑能正確轉換為 GitHub 標註支援的格式
                  file_for_annot = file_path.replace('\\', '/')
                  for s in secrets:
                      line = s.get('line_number') or s.get('start_line') or 1
                      print(f'::error file={file_for_annot},line={line}::Secret detected')
              sys.exit(1)
          PY

      - name: Upload detect-secrets report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: detect-secrets-report
          path: secrets_result.json
          retention-days: 2

      - name: Check detect-secrets status
        if: steps.detect_secrets.outcome == 'failure'
        run: |
          echo "Detect-secrets scan failed. Please check the artifact."
          exit 1

  compatibility-tests:
    name: CI-Tests / Python ${{ matrix.python-version }}
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Compile source files
        run: uv run python -m compileall -q src

      - name: Check formatting
        run: uv run ruff format --check src tests quick_test.py

      - name: Run Ruff lint
        run: uv run ruff check src tests quick_test.py

      - name: Run mypy
        run: uv run mypy src tests quick_test.py

      - name: Run smoke tests (pytest)
        run: uv run --isolated pytest -m smoke -q

      - name: Run integration tests (pytest)
        run: uv run --isolated pytest -m integration -q
