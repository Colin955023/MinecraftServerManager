name: "CodeQL 進階安全掃描"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "master", "dev" ]
  merge_group:
    types: [checks_requested]
  pull_request:
    branches: [ "master", "dev" ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions: {}

jobs:
  analyze:
    name: 分析 (Python)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: 檢出儲存庫
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: 安裝 uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78

    - name: 設定 Python 環境 (使用 uv)
      run: uv python install

    - name: 安裝專案依賴 (增強 CodeQL 分析準確度)
      run: uv sync

    - name: 初始化 CodeQL
      uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13
      with:
        languages: python
        build-mode: none
        # 僅保留設定檔引用，細節交給 config-file 處理
        config-file: .github/codeql/codeql-config.yml

    - name: 執行 CodeQL 分析
      uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13
      with:
        category: "/language:python"