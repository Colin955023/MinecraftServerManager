name: "CodeQL 進階安全掃描"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "master", "dev" ]
  merge_group:
    types: [checks_requested]
  pull_request:
    branches: [ "master", "dev" ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions: {}

jobs:
  analyze:
    name: 分析 (Python)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: 檢出儲存庫
      uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

    - name: 安裝 uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57

    - name: 設定 Python 環境 (使用 uv)
      run: uv python install

    - name: 安裝專案依賴 (增強 CodeQL 分析準確度)
      run: uv sync

    - name: 初始化 CodeQL
      uses: github/codeql-action/init@a899987af240c0578ed84ce13c02319a693e168f
      with:
        languages: python
        build-mode: none
        # 僅保留設定檔引用，細節交給 config-file 處理
        config-file: .github/codeql/codeql-config.yml

    - name: 執行 CodeQL 分析
      uses: github/codeql-action/analyze@a899987af240c0578ed84ce13c02319a693e168f
      with:
        category: "/language:python"