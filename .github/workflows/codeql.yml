name: "CodeQL Advanced Analysis"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
  merge_group:
    types: [checks_requested]
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'
permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      security-events: write
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: ${{ github.event_name == 'pull_request' && '10' || '0' }}
        persist-credentials: false

    - name: Setup Environment
      uses: ./.github/actions/setup-python-env
      with:
        uv-sync: 'true'

    - name: init CodeQL
      uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13
      with:
        languages: python
        build-mode: none
        queries: ${{ github.event_name == 'pull_request' && 'security-extended' || 'security-and-quality' }}
        # 僅保留設定檔引用，細節交給 config-file 處理
        config-file: .github/codeql/codeql-config.yml
        dependency-caching: true
        trap-caching: true

    - name: CodeQL Analyze
      uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13
      with:
        category: "/language:python"

