name: Build and Create Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    permissions:
      contents: write
      actions: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Verify Version Consistency
        if: startsWith(github.ref, 'refs/tags/')
        shell: python
        run: |
          import os, sys
          sys.path.append(os.getcwd())
          from src.version_info.version_info import APP_VERSION
          tag_ver = os.environ.get("GITHUB_REF_NAME", "")
          if str(APP_VERSION) not in tag_ver:
              print(f"::error::Version Mismatch! Code: {APP_VERSION}, Tag: {tag_ver}")
              sys.exit(1)
          print(f"Version verified: {APP_VERSION}")

      - name: Cache Nuitka compilation
        id: nuitka-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: .nuitka-cache
          key: nuitka-${{ runner.os }}-${{ hashFiles('**/*.toml', '**/*.txt') }}
          restore-keys: nuitka-${{ runner.os }}-

      - name: Build executable and installer
        shell: cmd
        env:
          NUITKA_CACHE_DIR: ${{ github.workspace }}\.nuitka-cache
          NUITKA_CACHE_HIT: ${{ steps.nuitka-cache.outputs.cache-hit }}
        run: |
          cd /d %GITHUB_WORKSPACE%
          call scripts\build_installer_nuitka.bat

      - name: Generate SHA256 checksums
        shell: powershell
        run: |
          Get-ChildItem "dist\*" -Include "*.exe", "*.zip" | ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash
              "$hash  $($_.Name)" | Out-File -FilePath "$($_.FullName).sha256" -Encoding ASCII -Force
          }

      - name: Extract release notes
        id: release_notes
        shell: python
        run: |
          import os, re, sys, uuid
          sys.path.append(os.getcwd())
          from src.version_info.version_info import APP_VERSION
          content = ""
          if os.path.exists("CHANGELOG.md"):
              with open("CHANGELOG.md", "r", encoding="utf-8-sig") as f:
                  content = f.read()
          pattern = fr"##\s+\[?{re.escape(str(APP_VERSION))}\]?.*?\n(.*?)(?=\n##\s+|$)"
          match = re.search(pattern, content, re.S)
          notes = match.group(1).strip() if match else "Release notes not found in CHANGELOG.md"
          
          delimiter = f"NOTES_{uuid.uuid4().hex}"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"notes<<{delimiter}\n{notes}\n{delimiter}\n")

      - name: Create Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.release_notes.outputs.notes }}
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $prereleaseArgs = @()
          if ($tag -match '-pre') { $prereleaseArgs += '--prerelease' }
          $assets = Get-ChildItem -Path 'dist' -File | Where-Object { $_.Name -match '\.(exe|zip)$' } | ForEach-Object { $_.FullName }
          if (-not $assets -or $assets.Count -eq 0) {
              Write-Host 'No release assets found in dist; aborting release creation'
              exit 1
          }
          $args = @('release','create',$tag) + $assets + @('--title', "Minecraft Server Manager $tag", '--notes', $env:RELEASE_NOTES) + $prereleaseArgs + @('--verify-tag')
          & gh @args

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: build-artifacts
          path: dist/
          retention-days: 2
