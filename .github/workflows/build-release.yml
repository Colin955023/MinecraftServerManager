name: Build and Create Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      RELEASE_TAG: ''

    permissions:
      contents: write
      discussions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Environment
        id: setup-python
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.13'
          uv-sync: 'false'

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          `$json = python .\scripts\version_check.py get-all
          if (`$LASTEXITCODE -ne 0) {
            Write-Error `"取得版本資訊與驗證失敗`"
            exit `$LASTEXITCODE
          }
          
          `$output = `$json | ConvertFrom-Json
          `$tag = `$output.Tag
          `$version = `$output.Version

          `"tag_name=`$tag`" | Out-File -FilePath `$env:GITHUB_OUTPUT -Encoding utf8 -Append
          `"version=`$version`" | Out-File -FilePath `$env:GITHUB_OUTPUT -Encoding utf8 -Append
          `"RELEASE_TAG=`$tag`" | Out-File -FilePath `$env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build executable and installer
        shell: pwsh
        run: python scripts\build_installer_nuitka.py

      - name: Extract release notes
        id: release_notes
        shell: pwsh
        run: |
          python .\scripts\version_check.py extract-release-notes --changelog CHANGELOG.md --output release_notes.md --strict
          if ($LASTEXITCODE -ne 0) {
            Write-Error "提取 release notes 失敗"
            exit $LASTEXITCODE
          }

      - name: Create and push release tag
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_NAME -ne 'master') {
              Write-Error "此 workflow 只能在 master 分支上手動執行，目前是 $env:GITHUB_REF_NAME"
              exit 1
          }

          git fetch --tags --force
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          $tag = $env:RELEASE_TAG
          $existingTagCommit = git rev-parse -q --verify "refs/tags/$tag^{commit}"
          if ($LASTEXITCODE -eq 0) {
              $headCommit = git rev-parse HEAD
              if ($LASTEXITCODE -ne 0) {
                  Write-Error "無法取得目前 commit"
                  exit $LASTEXITCODE
              }

              if ($existingTagCommit.Trim() -ne $headCommit.Trim()) {
                  Write-Error "Tag $tag 已存在，但指向不同 commit；請改用新版本號"
                  exit 1
              }

              Write-Host "Tag already exists and matches HEAD: $tag"
              exit 0
          }

          git tag -a $tag -m $tag
          if ($LASTEXITCODE -ne 0) {
              Write-Error "建立 tag 失敗：$tag"
              exit $LASTEXITCODE
          }

          git push origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
              Write-Error "推送 tag 失敗：$tag"
              exit $LASTEXITCODE
          }

      - name: Create Release and Upload Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $prereleaseArgs = @()
          if ($tag -match '-pre') { $prereleaseArgs += '--prerelease' }
          $assets = Get-ChildItem -Path 'dist' -File | Where-Object { $_.Name -match '^(MinecraftServerManager|.*-Setup-).*\.(exe|zip)$' } | ForEach-Object { $_.FullName }
          if (-not $assets -or $assets.Count -eq 0) {
              Write-Host 'No release assets found in dist; aborting release creation'
              exit 1
          }
          $args = @('release', 'create', $tag) + $assets + @(
              '--title', "Minecraft Server Manager $tag", 
              '--notes-file', 'release_notes.md', 
              '--verify-tag'
          ) + $prereleaseArgs
          
          Write-Host "Executing: gh $args"
          & gh @args
          if ($LASTEXITCODE -ne 0) {
              Write-Error "GitHub CLI failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
          }

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: build_artifacts
          path: dist/
          if-no-files-found: error
          retention-days: 2
