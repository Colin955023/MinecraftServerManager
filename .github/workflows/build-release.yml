name: Build and Create Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        shell: python
        run: |
          import os, re, sys

          sys.path.append(os.getcwd())
          from src.version_info.version_info import APP_VERSION

          tag_name = f'{APP_VERSION}'

          normalized_tag = tag_name[1:] if tag_name.startswith('v') else tag_name
          if normalized_tag != str(APP_VERSION):
              print(f'::error::Tag 與版本號不一致：tag={tag_name}, version={APP_VERSION}')
              sys.exit(1)

          if not re.fullmatch(r'v?\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?', tag_name):
              print(f'::error::Tag 格式不合法：{tag_name}')
              sys.exit(1)

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f'tag_name={tag_name}\n')
              fh.write(f'version={APP_VERSION}\n')

      - name: Set up Python 3.13
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Cache Nuitka compilation
        id: nuitka-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: .nuitka-cache
          key: nuitka-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('uv.lock', 'pyproject.toml', 'scripts/build_installer_nuitka.bat') }}
          restore-keys: nuitka-${{ runner.os }}-

      - name: Inspect restored Nuitka cache
        shell: pwsh
        run: |
          $cacheDir = Join-Path $env:GITHUB_WORKSPACE '.nuitka-cache'
          $cacheHit = '${{ steps.nuitka-cache.outputs.cache-hit }}'
          Write-Host "NUITKA_CACHE_HIT=$cacheHit"
          if (Test-Path $cacheDir) {
              $fileCount = (Get-ChildItem -Path $cacheDir -Recurse -File -ErrorAction SilentlyContinue | Measure-Object).Count
              $totalBytes = (Get-ChildItem -Path $cacheDir -Recurse -File -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum
              if (-not $totalBytes) { $totalBytes = 0 }
              $sizeMb = [Math]::Round($totalBytes / 1MB, 2)
              Write-Host "Nuitka cache exists. Files=$fileCount SizeMB=$sizeMb Path=$cacheDir"
              Get-ChildItem -Path $cacheDir -Directory -ErrorAction SilentlyContinue | Select-Object -First 20 | ForEach-Object { Write-Host " - $($_.Name)" }
          } else {
              Write-Host "Nuitka cache directory not found before build: $cacheDir"
          }

      - name: Build executable and installer
        shell: cmd
        env:
          NUITKA_CACHE_DIR: ${{ github.workspace }}\.nuitka-cache
          NUITKA_CACHE_HIT: ${{ steps.nuitka-cache.outputs.cache-hit }}
        run: |
          cd /d %GITHUB_WORKSPACE%
          call scripts\build_installer_nuitka.bat

      - name: Inspect Nuitka cache after build
        if: always()
        shell: pwsh
        run: |
          $cacheDir = Join-Path $env:GITHUB_WORKSPACE '.nuitka-cache'
          if (Test-Path $cacheDir) {
              $fileCount = (Get-ChildItem -Path $cacheDir -Recurse -File -ErrorAction SilentlyContinue | Measure-Object).Count
              $totalBytes = (Get-ChildItem -Path $cacheDir -Recurse -File -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum
              if (-not $totalBytes) { $totalBytes = 0 }
              $sizeMb = [Math]::Round($totalBytes / 1MB, 2)
              Write-Host "Nuitka cache after build. Files=$fileCount SizeMB=$sizeMb Path=$cacheDir"
          } else {
              Write-Host "Nuitka cache directory not found after build: $cacheDir"
          }

      - name: Extract release notes
        id: release_notes
        shell: python
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag_name }}
        run: |
          import os, re, sys
          sys.path.append(os.getcwd())
          from src.version_info.version_info import APP_VERSION
          content = ""
          if os.path.exists("CHANGELOG.md"):
              with open("CHANGELOG.md", "r", encoding="utf-8-sig") as f:
                  content = f.read()

          tag_name = os.environ.get("RELEASE_TAG", "").strip()
          version_candidates = [str(APP_VERSION)]
          if tag_name:
              version_candidates.append(tag_name)
              if tag_name.startswith("v") and len(tag_name) > 1:
                  version_candidates.append(tag_name[1:])
              else:
                  version_candidates.append(f"v{tag_name}")

          version_candidates = list(dict.fromkeys([ver for ver in version_candidates if ver]))

          heading_patterns = [
              fr"##\s+\[?{re.escape(ver)}\]?.*?\n(.*?)(?=\n##\s+|$)"
              for ver in version_candidates
          ]

          match = None
          for pattern in heading_patterns:
              match = re.search(pattern, content, re.S)
              if match:
                  break

          notes = match.group(1).strip() if match else "Release notes not found in CHANGELOG.md"

          with open("release_notes.md", "w", encoding="utf-8") as f:
              f.write(notes)
          print("Successfully extracted release notes to release_notes.md")

      - name: Create and push release tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag_name }}
        run: |
          if ($env:GITHUB_REF_NAME -ne 'master') {
              Write-Error "此 workflow 只能在 master 分支上手動執行，目前是 $env:GITHUB_REF_NAME"
              exit 1
          }

          git fetch --tags --force
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          $tag = $env:RELEASE_TAG
          $existingTagCommit = git rev-parse -q --verify "refs/tags/$tag^{commit}"
          if ($LASTEXITCODE -eq 0) {
              $headCommit = git rev-parse HEAD
              if ($LASTEXITCODE -ne 0) {
                  Write-Error "無法取得目前 commit"
                  exit $LASTEXITCODE
              }

              if ($existingTagCommit.Trim() -ne $headCommit.Trim()) {
                  Write-Error "Tag $tag 已存在，但指向不同 commit；請改用新版本號"
                  exit 1
              }

              Write-Host "Tag already exists and matches HEAD: $tag"
              exit 0
          }

          git tag -a $tag -m $tag
          if ($LASTEXITCODE -ne 0) {
              Write-Error "建立 tag 失敗：$tag"
              exit $LASTEXITCODE
          }

          git push origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
              Write-Error "推送 tag 失敗：$tag"
              exit $LASTEXITCODE
          }

      - name: Create Release and Upload Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag_name }}
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $prereleaseArgs = @()
          if ($tag -match '-pre') { $prereleaseArgs += '--prerelease' }
          $assets = Get-ChildItem -Path 'dist' -File | Where-Object { $_.Name -match '\.(exe|zip)$' } | ForEach-Object { $_.FullName }
          if (-not $assets -or $assets.Count -eq 0) {
              Write-Host 'No release assets found in dist; aborting release creation'
              exit 1
          }
          $args = @('release', 'create', $tag) + $assets + @(
              '--title', "Minecraft Server Manager $tag", 
              '--notes-file', 'release_notes.md', 
              '--verify-tag'
          ) + $prereleaseArgs
          
          Write-Host "Executing: gh $args"
          & gh @args
          if ($LASTEXITCODE -ne 0) {
              Write-Error "GitHub CLI failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
          }

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: build_artifacts
          path: dist/
          if-no-files-found: error
          retention-days: 2