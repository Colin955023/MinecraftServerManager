name: Build and Create Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest

    permissions:
      contents: write    # 用於建立 Release 與上傳檔案
      actions: read      # 保持基本的讀取
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python 3.12
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355
        with:
          enable-cache: true

      - name: Cache Nuitka compilation
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: .nuitka-cache
          key: nuitka-${{ runner.os }}-${{ hashFiles('src/**/*.py') }}
          restore-keys: nuitka-${{ runner.os }}-

      - name: Download Inno Setup Chinese Traditional Language File
        shell: powershell
        run: |
          $langDir = 'C:\Program Files (x86)\Inno Setup 6\Languages'
          if (-not (Test-Path $langDir)) {
            New-Item -ItemType Directory -Path $langDir -Force | Out-Null
          }
          $url = 'https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseTraditional.isl'
          $output = Join-Path $langDir 'ChineseTraditional.isl'
          Invoke-WebRequest -Uri $url -OutFile $output
          Write-Host ("Downloaded Chinese Traditional language file to {0}" -f $output)
          
      - name: Build executable and installer
        shell: cmd
        run: |
          cd /d %GITHUB_WORKSPACE%
          call scripts\build_installer_nuitka.bat

      - name: Generate SHA256 checksums
        shell: powershell
        run: |
          $version = python -c "from src.version_info import APP_VERSION; print(APP_VERSION)" 2>$null
          
          # 安裝程式 SHA256
          $instPath = "dist\MinecraftServerManager-Setup-$version.exe"
          if (Test-Path $instPath) {
              $hash = (Get-FileHash -Algorithm SHA256 -Path $instPath).Hash
              $name = Split-Path $instPath -Leaf
              "$hash  $name" | Out-File -FilePath "$instPath.sha256" -Encoding ASCII -Force
              Write-Host "Installer SHA256: $hash"
          }
          
          # 可攜版 ZIP SHA256
          $zipPath = "dist\MinecraftServerManager-v$version-portable.zip"
          if (Test-Path $zipPath) {
              $hash = (Get-FileHash -Algorithm SHA256 -Path $zipPath).Hash
              $name = Split-Path $zipPath -Leaf
              "$hash  $name" | Out-File -FilePath "$zipPath.sha256" -Encoding ASCII -Force
              Write-Host "Portable ZIP SHA256: $hash"
          }

      - name: Extract release notes
        id: release_notes
        shell: python
        run: |
          import os
          import re
          import sys

          # 確保可從 src 匯入模組
          sys.path.append(os.getcwd())
          
          print(f"CWD: {os.getcwd()}")

          try:
              from src.version_info.version_info import APP_VERSION
              version = str(APP_VERSION)
              print(f"Detected version: {version}")
          except Exception as e:
              print(f"Error importing version: {e}")
              version = ""

          tag_name = os.environ.get("GITHUB_REF_NAME", "").strip()
          tag_version = tag_name
          version_candidates: list[str] = []
          for candidate in (version, tag_version):
              if candidate and candidate not in version_candidates:
                  version_candidates.append(candidate)
          print(f"Version candidates: {version_candidates}")

          changelog_file = "CHANGELOG.md"
          notes = ""
          
          if os.path.exists(changelog_file) and version_candidates:
              try:
                  # 使用 utf-8-sig 以處理可能存在的 BOM
                  with open(changelog_file, "r", encoding="utf-8-sig") as f:
                      lines = f.readlines()
                  
                  print(f"Read {len(lines)} lines from {changelog_file}")

                  capture = False
                  captured_lines = []

                  def is_target_version_header(line: str) -> bool:
                      for target_version in version_candidates:
                          pattern = re.compile(
                              fr"^##\s+(?:\[{re.escape(target_version)}\]|v?{re.escape(target_version)})(?:\s+|-|$)"
                          )
                          if pattern.match(line):
                              return True
                      return False

                  # 進入下一個 H2 章節時停止擷取
                  next_section_pattern = re.compile(r"^##\s+")

                  for line in lines:
                      if is_target_version_header(line):
                          print(f"Found version section: {line.strip()}")
                          capture = True
                          continue
                      
                      # 若遇到下一個標題就停止
                      if capture and next_section_pattern.match(line):
                          print(f"Found next section, stopping capture: {line.strip()}")
                          break
                      
                      if capture:
                          captured_lines.append(line.rstrip())
                          
                  notes = "\n".join(captured_lines).strip()
                  print(f"Captured release notes length: {len(notes)}")
              except Exception as e:
                  print(f"Error reading changelog: {e}")

          if not notes:
              print("No release notes captured, using default.")
              notes = "See commits for details"
          
          # 以明確的 utf-8 編碼寫入 GITHUB_OUTPUT
          # 使用唯一分隔符，避免 release notes 含獨立 "EOF" 行時提早結束
          if "GITHUB_OUTPUT" in os.environ:
              import uuid

              delimiter = f"NOTES_{uuid.uuid4().hex}"
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
                  f.write(f"notes<<{delimiter}\n{notes}\n{delimiter}\n")

      - name: Create Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 修正重點：將輸出的內容對應至環境變數，避免指令注入漏洞
          RELEASE_NOTES: ${{ steps.release_notes.outputs.notes }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          tag="${GITHUB_REF_NAME}"
          title="Minecraft Server Manager ${tag}"
          prerelease_args=()
          # tag 規範：不使用 v 前綴；正式版為純版本號，開發測試版使用 -pre 後綴。
          # 版本標籤命名範例：
          #   1.6.6
          #   1.6.6-pre
          #   1.6.6-pre1
          # 只有符合「純版本號 + -pre 或 -pre數字」的 tag 會標記為 GitHub pre-release。
          if [[ "${tag}" =~ ^[0-9]+(\.[0-9]+)*-pre[0-9]*$ ]]; then
            prerelease_args+=(--prerelease)
            echo "Detected pre-release tag: ${tag}"
          fi

          assets=(
            dist/MinecraftServerManager-Setup-*.exe
            dist/MinecraftServerManager-Setup-*.exe.sha256
            dist/MinecraftServerManager-v*-portable.zip
            dist/MinecraftServerManager-v*-portable.zip.sha256
          )

          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets were found."
            exit 1
          fi

          notes_file="$(mktemp)"
          # 使用環境變數 "$RELEASE_NOTES"
          printf '%s\n' "$RELEASE_NOTES" > "${notes_file}"

          gh release create "${tag}" "${assets[@]}" \
            --title "${title}" \
            --notes-file "${notes_file}" \
            "${prerelease_args[@]}" \
            --verify-tag

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: build-artifacts
          path: |
            dist/MinecraftServerManager-Setup-*
            dist/MinecraftServerManager-v*-portable.zip*
          retention-days: 2
