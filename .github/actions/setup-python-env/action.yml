name: 'Setup Python Environment'
description: 'Sets up Python, installs uv, and optionally syncs dependencies with uv. Note: You must run actions/checkout before using this action.'

inputs:
  python-version:
    description: 'Python version to set up'
    required: false
    default: '3.14'
  uv-sync:
    description: 'Whether to run `uv sync` to install dependencies. Set to "true" to run.'
    required: false
    default: 'false'

outputs:
  python-version:
    description: 'Installed Python version'
    value: ${{ steps.setup-python.outputs.python-version }}
    
runs:
  using: "composite"
  steps:
    - id: setup-python
      name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    - name: Install dependencies
      if: ${{ inputs.uv-sync == 'true' }}
      shell: bash
      run: uv sync --all-groups --frozen
